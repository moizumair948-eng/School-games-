<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olive Class Gaming Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:black;
color:white;
overflow:hidden;
}

/* 🌌 CANVAS */
canvas{
position:fixed;
inset:0;
z-index:-10;
opacity:0;
transition:1.5s;
}

/* HEADER */
header{
text-align:center;
padding:20px;
text-shadow:0 0 20px cyan;
opacity:0;
transition:1.5s;
}

/* MENU */
.menu{
display:flex;
gap:20px;
padding:30px;
margin-left:90px;
overflow-x:auto;
opacity:0;
transition:1.5s;
}

.game{
min-width:180px;
padding:15px;
border-radius:12px;
background:rgba(255,255,255,0.04);
border:2px solid #00ffff;
text-align:center;
transition:0.2s;
}

.game.selected{
transform:scale(1.4);
box-shadow:0 0 70px cyan;
border-color:#ff00ff;
}

button{
margin-top:10px;
padding:10px 14px;
border-radius:10px;
border:2px solid #00ffff;
background:rgba(0,0,0,0.5);
color:#00ffff;
box-shadow:0 0 15px #00ffff;
cursor:pointer;
}

/* CONTROLLER */
.controller{
position:fixed;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:10px;
z-index:10;
opacity:0;
transition:1.5s;
}

.controller button{
width:70px;
height:70px;
font-size:24px;
border-radius:14px;
}

.action button{
width:140px;
height:60px;
border:2px solid #ff00ff;
color:#ff00ff;
box-shadow:0 0 25px #ff00ff;
}

/* MUSIC */
#musicBtn{
position:fixed;
bottom:20px;
right:20px;
padding:12px;
border:2px solid #ff00ff;
background:black;
color:#ff00ff;
box-shadow:0 0 20px #ff00ff;
opacity:0;
transition:1.5s;
}

/* VISUALIZER */
#bars{
position:fixed;
bottom:0;
left:0;
width:100%;
height:120px;
display:flex;
align-items:flex-end;
justify-content:center;
gap:2px;
opacity:0;
}

.bar{
width:4px;
height:10px;
background:cyan;
box-shadow:0 0 10px cyan;
}

/* SHAKE */
@keyframes shake{
0%{transform:translate(0,0)}
25%{transform:translate(2px,-2px)}
50%{transform:translate(-2px,2px)}
75%{transform:translate(2px,2px)}
100%{transform:translate(0,0)}
}

.shake{animation:shake 0.15s infinite;}

</style>
</head>

<body>

<canvas id="space"></canvas>

<header>
<h1>OLIVE CLASS GAMING HUB</h1>
<p>NEON WARP SYSTEM</p>
</header>

<div class="controller">
<button onclick="move(-1)">⬅</button>
<button onclick="move(1)">➡</button>
<div class="action">
<button onclick="activateGame()">SELECT</button>
</div>
</div>

<div class="menu">

<!-- 25 GAMES RESTORED -->
<div class="game"><h3>Poki</h3><button onclick="go('https://poki.com')">Play</button></div>
<div class="game"><h3>CrazyGames</h3><button onclick="go('https://crazygames.com')">Play</button></div>
<div class="game"><h3>Y8</h3><button onclick="go('https://y8.com')">Play</button></div>
<div class="game"><h3>Miniclip</h3><button onclick="go('https://miniclip.com')">Play</button></div>
<div class="game"><h3>Armor Games</h3><button onclick="go('https://armorgames.com')">Play</button></div>

<div class="game"><h3>Slither</h3><button onclick="go('https://slither.io')">Play</button></div>
<div class="game"><h3>Agar</h3><button onclick="go('https://agar.io')">Play</button></div>
<div class="game"><h3>2048</h3><button onclick="go('https://play2048.co')">Play</button></div>
<div class="game"><h3>Tetris</h3><button onclick="go('https://tetris.com')">Play</button></div>
<div class="game"><h3>Dino</h3><button onclick="go('https://chromedino.com')">Play</button></div>

<div class="game"><h3>Shell Shockers</h3><button onclick="go('https://shellshock.io')">Play</button></div>
<div class="game"><h3>Krunker</h3><button onclick="go('https://krunker.io')">Play</button></div>
<div class="game"><h3>Venge</h3><button onclick="go('https://venge.io')">Play</button></div>
<div class="game"><h3>1v1.lol</h3><button onclick="go('https://1v1.lol')">Play</button></div>
<div class="game"><h3>Zombs Royale</h3><button onclick="go('https://zombsroyale.io')">Play</button></div>

<div class="game"><h3>Paper.io</h3><button onclick="go('https://paper-io.com')">Play</button></div>
<div class="game"><h3>Diep.io</h3><button onclick="go('https://diep.io')">Play</button></div>
<div class="game"><h3>Bonk.io</h3><button onclick="go('https://bonk.io')">Play</button></div>
<div class="game"><h3>Hole.io</h3><button onclick="go('https://hole-io.com')">Play</button></div>
<div class="game"><h3>Run 3</h3><button onclick="go('https://run3.io')">Play</button></div>

<div class="game"><h3>Roblox</h3><button onclick="go('https://roblox.com')">Play</button></div>
<div class="game"><h3>Coolmath</h3><button onclick="go('https://coolmathgames.com')">Play</button></div>
<div class="game"><h3>Crazy Cars</h3><button onclick="go('https://poki.com/en/g/madalin-stunt-cars-2')">Play</button></div>
<div class="game"><h3>Stickman Hook</h3><button onclick="go('https://poki.com/en/g/stickman-hook')">Play</button></div>
<div class="game"><h3>Fireboy & Watergirl</h3><button onclick="go('https://poki.com/en/g/fireboy-and-watergirl-forest-temple')">Play</button></div>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🎵 Play Music</button>

<div id="bars"></div>

<script>

/* 🌌 WARP BACKGROUND */
const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=Array(900).fill().map(()=>({
x:(Math.random()-0.5)*canvas.width,
y:(Math.random()-0.5)*canvas.height,
z:Math.random()*canvas.width,
speed:2+Math.random()*4
}));

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

let grad=ctx.createRadialGradient(
canvas.width/2,
canvas.height/2,
100,
canvas.width/2,
canvas.height/2,
canvas.width
);

grad.addColorStop(0,"rgba(0,255,255,0.18)");
grad.addColorStop(0.4,"rgba(255,0,255,0.08)");
grad.addColorStop(1,"black");

ctx.fillStyle=grad;
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let p of particles){

p.z-=p.speed;
if(p.z<=1){
p.z=canvas.width;
p.x=(Math.random()-0.5)*canvas.width;
p.y=(Math.random()-0.5)*canvas.height;
}

let k=128/p.z;
let sx=p.x*k+canvas.width/2;
let sy=p.y*k+canvas.height/2;

let size=(1-p.z/canvas.width)*3;

ctx.beginPath();
ctx.fillStyle=`rgba(0,255,255,${1-p.z/canvas.width})`;
ctx.shadowBlur=20;
ctx.shadowColor="#00ffff";
ctx.arc(sx,sy,size,0,Math.PI*2);
ctx.fill();
}

requestAnimationFrame(draw);
}

/* NAV */
const games=document.querySelectorAll(".game");
let index=0;

function update(){
games.forEach(g=>g.classList.remove("selected"));
games[index].classList.add("selected");
games[index].scrollIntoView({behavior:"smooth",inline:"center"});
}

function move(d){
index=(index+d+games.length)%games.length;
update();
}

function go(url){
window.open(url,"_blank");
}

function activateGame(){
games[index].querySelector("button").click();
}

/* 🎵 AUDIO SYNC */
const music=document.getElementById("music");
const musicBtn=document.getElementById("musicBtn");

const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
const source=audioCtx.createMediaElementSource(music);
const analyser=audioCtx.createAnalyser();
analyser.fftSize=256;

source.connect(analyser);
analyser.connect(audioCtx.destination);

const data=new Uint8Array(analyser.frequencyBinCount);

/* BARS */
const bars=document.getElementById("bars");

for(let i=0;i<60;i++){
let b=document.createElement("div");
b.className="bar";
bars.appendChild(b);
}

const barEls=document.querySelectorAll(".bar");

let lastBeat=0;

function beat(){
analyser.getByteFrequencyData(data);

let sum=0;
let bass=data[2]+data[3]+data[4];

for(let i=0;i<data.length;i++)sum+=data[i];

let avg=sum/data.length/255;
let energy=bass/255;

document.body.style.filter=`brightness(${1+avg*0.5}) saturate(${1+avg})`;

games.forEach(g=>{
g.style.transform=`scale(${1+avg*0.08})`;
});

if(energy>0.6 && Date.now()-lastBeat>200){
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),120);
lastBeat=Date.now();
}

for(let i=0;i<barEls.length;i++){
barEls[i].style.height=(data[i]/255*120)+"px";
}

requestAnimationFrame(beat);
}

/* START */
musicBtn.onclick=async()=>{
await audioCtx.resume();

if(music.paused){
music.play();
beat();
musicBtn.innerText="⏸ Pause Music";

canvas.style.opacity="1";
document.querySelector("header").style.opacity="1";
document.querySelector(".menu").style.opacity="1";
document.querySelector(".controller").style.opacity="1";
document.getElementById("bars").style.opacity="1";
}else{
music.pause();
musicBtn.innerText="🎵 Play Music";
}
};

/* BOOT */
let p=0;
let boot=setInterval(()=>{
p++;
if(p>=100){
clearInterval(boot);
draw();

canvas.style.opacity="1";
document.querySelector("header").style.opacity="1";
document.querySelector(".menu").style.opacity="1";
document.querySelector(".controller").style.opacity="1";
document.getElementById("musicBtn").style.opacity="1";
document.getElementById("bars").style.opacity="1";
}
},20);

</script>

</body>
                                 </html>
