<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Olive Gaming Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;
    background: radial-gradient(circle at top, #12002b, #000);
}

/* HEADER */
header {
    text-align: center;
    padding: 25px 10px;
}

header h1 {
    font-size: 32px;
    margin: 0;
    text-shadow: 0 0 20px #8a2be2;
}

header p {
    margin: 5px 0 0;
    opacity: 0.7;
    font-size: 14px;
}

/* SATURN */
.saturn {
    position: fixed;
    top: 10%;
    right: -120px;
    width: 320px;
    height: 320px;
    animation: float 6s ease-in-out infinite;
    z-index: 0;
}

.saturn::before {
    content: "";
    position: absolute;
    width: 180px;
    height: 180px;
    top: 70px;
    left: 70px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffd9a0, #ff9a3c, #6b2d00);
}

.saturn::after {
    content: "";
    position: absolute;
    width: 320px;
    height: 120px;
    top: 100px;
    left: 0;
    border-radius: 50%;
    border: 4px solid rgba(255,220,160,0.6);
    transform: rotate(25deg);
    animation: ringSpin 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(20px); }
    100% { transform: translateY(0px); }
}

@keyframes ringSpin {
    from { transform: rotate(25deg) rotateZ(0deg); }
    to { transform: rotate(25deg) rotateZ(360deg); }
}

/* MENU */
.menu {
    display: flex;
    overflow-x: auto;
    gap: 20px;
    padding: 30px;
    scroll-snap-type: x mandatory;
    margin-top: 50px;
}

.menu::-webkit-scrollbar {
    display: none;
}

.game {
    min-width: 180px;
    background: rgba(255,255,255,0.05);
    border: 1px solid #8a2be2;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    scroll-snap-align: center;
    transition: 0.3s;
}

.game.selected {
    transform: scale(1.3);
    box-shadow: 0 0 40px #b400ff;
    border: 2px solid white;
}

button {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    background: #8a2be2;
    color: white;
    cursor: pointer;
}

/* MUSIC */
#musicBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 12px;
    background: #8a2be2;
    color: white;
    border: none;
    border-radius: 10px;
}

</style>
</head>

<body>

<div class="saturn"></div>

<header>
<h1>OLIVE CLASS GAMING HUB</h1>
<p>made by moiz</p>
</header>

<!-- GAMES -->
<div class="menu">

<div class="game"><h3>Roblox</h3><button onclick="window.open('https://www.roblox.com','_blank')">Play</button></div>
<div class="game"><h3>Minecraft</h3><button onclick="window.open('https://www.minecraft.net','_blank')">Play</button></div>
<div class="game"><h3>Fortnite</h3><button onclick="window.open('https://www.fortnite.com','_blank')">Play</button></div>
<div class="game"><h3>Valorant</h3><button onclick="window.open('https://playvalorant.com','_blank')">Play</button></div>
<div class="game"><h3>CS2</h3><button onclick="window.open('https://www.counter-strike.net','_blank')">Play</button></div>

<div class="game"><h3>Rocket League</h3><button onclick="window.open('https://www.rocketleague.com','_blank')">Play</button></div>
<div class="game"><h3>GTA V</h3><button onclick="window.open('https://www.rockstargames.com','_blank')">Play</button></div>
<div class="game"><h3>COD</h3><button onclick="window.open('https://www.callofduty.com','_blank')">Play</button></div>
<div class="game"><h3>FIFA</h3><button onclick="window.open('https://www.ea.com/games/fifa','_blank')">Play</button></div>
<div class="game"><h3>Among Us</h3><button onclick="window.open('https://innersloth.com','_blank')">Play</button></div>

<div class="game"><h3>Fall Guys</h3><button onclick="window.open('https://www.fallguys.com','_blank')">Play</button></div>
<div class="game"><h3>Subway Surfers</h3><button onclick="window.open('https://poki.com/en/g/subway-surfers','_blank')">Play</button></div>
<div class="game"><h3>Temple Run</h3><button onclick="window.open('https://poki.com/en/g/temple-run-2','_blank')">Play</button></div>
<div class="game"><h3>Geometry Dash</h3><button onclick="window.open('https://geometrydash.io','_blank')">Play</button></div>
<div class="game"><h3>Clash Royale</h3><button onclick="window.open('https://supercell.com/en/games/clashroyale','_blank')">Play</button></div>

<div class="game"><h3>Brawl Stars</h3><button onclick="window.open('https://supercell.com/en/games/brawlstars','_blank')">Play</button></div>
<div class="game"><h3>Stumble Guys</h3><button onclick="window.open('https://stumbleguys.com','_blank')">Play</button></div>
<div class="game"><h3>Shell Shockers</h3><button onclick="window.open('https://shellshock.io','_blank')">Play</button></div>
<div class="game"><h3>Krunker</h3><button onclick="window.open('https://krunker.io','_blank')">Play</button></div>
<div class="game"><h3>Venge.io</h3><button onclick="window.open('https://venge.io','_blank')">Play</button></div>

<div class="game"><h3>Extra</h3><button onclick="alert('Coming soon')">Play</button></div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🎵 Play Music</button>

<script>

const games = document.querySelectorAll(".game");
let index = 0;

function update(){
    games.forEach(g=>g.classList.remove("selected"));
    if(games[index]) games[index].classList.add("selected");
}

update();

/* KEYBOARD */
document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowRight"||e.key==="d"){
index=(index+1)%games.length;
update();
}

if(e.key==="ArrowLeft"||e.key==="a"){
index=(index-1+games.length)%games.length;
update();
}

if(e.key==="Enter"){
games[index].querySelector("button").click();
}

});

/* CLICK SELECT */
games.forEach((g,i)=>{
g.addEventListener("click",()=>{
index=i;
update();
});
});

/* MUSIC */
const music=document.getElementById("music");
const btn=document.getElementById("musicBtn");

btn.onclick=()=>{
if(music.paused){
music.play();
btn.innerText="⏸ Pause Music";
}else{
music.pause();
btn.innerText="🎵 Play Music";
}
};

</script>

</body>
    </html>
