<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Olive Class Gaming Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* GLOBAL FIX (NO MORE ZOOM OUT) */
html, body {
width:100%;
height:100%;
}

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:radial-gradient(circle at top,#12002b,#000);
color:white;
overflow:hidden;

/* keeps everything centered nicely */
transform:scale(1);
transform-origin:top center;
}

/* STARFIELD */
canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-10;
}

/* SATURN */
.saturn{
position:fixed;
top:10%;
right:-120px;
width:300px;
height:300px;
background:radial-gradient(circle,#ffb86b,#ff7b00,#4a1f00);
border-radius:50%;
animation:float 6s ease-in-out infinite;
}

@keyframes float{
50%{transform:translateY(20px);}
}

/* MENU (FIXED FOR SCREEN FIT) */
.menu{
display:flex;
gap:20px;
padding:30px;
margin:0 auto;
justify-content:center;
flex-wrap:nowrap;
overflow-x:auto;
max-width:100vw;
}

/* GAME CARD */
.game{
min-width:180px;
padding:15px;
border-radius:12px;
background:rgba(255,255,255,0.05);
border:2px solid;
animation:rgb 6s linear infinite;
text-align:center;
transition:0.3s;
}

@keyframes rgb{
0%{border-color:red;}
25%{border-color:lime;}
50%{border-color:cyan;}
75%{border-color:magenta;}
100%{border-color:red;}
}

.game.selected{
transform:scale(1.25);
box-shadow:0 0 35px white;
}

/* BUTTONS */
button{
margin-top:10px;
padding:10px;
border:none;
border-radius:8px;
background:#00c3ff;
color:white;
box-shadow:0 0 10px #00c3ff;
}

/* ARROWS */
.navBtn{
position:fixed;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:10px;
z-index:999;
}

.navBtn button{
width:55px;
height:55px;
border:2px solid #00ff66;
background:black;
color:#00ff66;
font-size:20px;
box-shadow:0 0 10px #00ff66;
}

/* WARP */
#warp{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle,rgba(0,255,255,0.25),transparent 60%);
opacity:0;
pointer-events:none;
}

#warp.active{
animation:warp 0.65s ease-out;
}

@keyframes warp{
0%{opacity:0;transform:scale(1);}
30%{opacity:1;}
100%{opacity:0;transform:scale(2.2);}
}

/* MUSIC BUTTON FIX */
#musicBtn{
position:fixed;
bottom:20px;
right:20px;
padding:12px;
background:#8a2be2;
border:none;
border-radius:10px;
color:white;
z-index:999;
}

</style>
</head>

<body>

<canvas id="space"></canvas>
<div id="warp"></div>

<div class="saturn"></div>

<header style="text-align:center;padding:20px;">
<h1>OLIVE CLASS GAMING HUB</h1>
<p>made by moiz</p>
</header>

<div class="navBtn">
<button onclick="moveLeft()">⬅</button>
<button onclick="moveRight()">➡</button>
</div>

<div class="menu">

<div class="game"><h3>Poki</h3><button onclick="go('https://poki.com')">Play</button></div>
<div class="game"><h3>CrazyGames</h3><button onclick="go('https://crazygames.com')">Play</button></div>
<div class="game"><h3>Y8</h3><button onclick="go('https://y8.com')">Play</button></div>
<div class="game"><h3>Miniclip</h3><button onclick="go('https://miniclip.com')">Play</button></div>
<div class="game"><h3>Armor Games</h3><button onclick="go('https://armorgames.com')">Play</button></div>

<div class="game"><h3>Slither</h3><button onclick="go('https://slither.io')">Play</button></div>
<div class="game"><h3>Agar</h3><button onclick="go('https://agar.io')">Play</button></div>
<div class="game"><h3>2048</h3><button onclick="go('https://play2048.co')">Play</button></div>
<div class="game"><h3>Tetris</h3><button onclick="go('https://tetris.com')">Play</button></div>
<div class="game"><h3>Dino</h3><button onclick="go('https://chromedino.com')">Play</button></div>

<div class="game"><h3>Shell Shockers</h3><button onclick="go('https://shellshock.io')">Play</button></div>
<div class="game"><h3>Krunker</h3><button onclick="go('https://krunker.io')">Play</button></div>
<div class="game"><h3>Venge</h3><button onclick="go('https://venge.io')">Play</button></div>
<div class="game"><h3>1v1.lol</h3><button onclick="go('https://1v1.lol')">Play</button></div>
<div class="game"><h3>Zombs Royale</h3><button onclick="go('https://zombsroyale.io')">Play</button></div>

<div class="game"><h3>Paper.io</h3><button onclick="go('https://paper-io.com')">Play</button></div>
<div class="game"><h3>Diep.io</h3><button onclick="go('https://diep.io')">Play</button></div>
<div class="game"><h3>Bonk.io</h3><button onclick="go('https://bonk.io')">Play</button></div>
<div class="game"><h3>Hole.io</h3><button onclick="go('https://hole-io.com')">Play</button></div>
<div class="game"><h3>Run 3</h3><button onclick="go('https://run3.io')">Play</button></div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- CLICK SOUND -->
<audio id="clickSound" src="fahh.mp3" preload="auto"></audio>

<button id="musicBtn">🎵 Play Music</button>

<script>

const games=document.querySelectorAll(".game");
let index=0;

/* STARFIELD */
const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=Array(200).fill().map(()=>({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
z:Math.random()*canvas.width
}));

function draw(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let s of stars){
s.z-=2;
if(s.z<=0) s.z=canvas.width;

let k=128/s.z;
let x=s.x*k+canvas.width/2;
let y=s.y*k+canvas.height/2;

ctx.fillStyle="white";
ctx.fillRect(x,y,2,2);
}
requestAnimationFrame(draw);
}
draw();

/* WARP */
const warp=document.getElementById("warp");

/* CLICK SOUND */
const clickSound=document.getElementById("clickSound");

function playClick(){
clickSound.currentTime=0;
clickSound.play();
}

/* UPDATE UI */
function update(){
games.forEach(g=>g.classList.remove("selected"));
if(games[index]){
games[index].classList.add("selected");
games[index].scrollIntoView({behavior:"smooth",inline:"center"});
}
}

/* NAVIGATION */
function moveLeft(){
index=(index-1+games.length)%games.length;
update();
warp.classList.add("active");
setTimeout(()=>warp.classList.remove("active"),650);
playClick();
}

function moveRight(){
index=(index+1)%games.length;
update();
warp.classList.add("active");
setTimeout(()=>warp.classList.remove("active"),650);
playClick();
}

function go(url){
window.open(url,"_blank");
}

/* KEYBOARD */
document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowRight") moveRight();
if(e.key==="ArrowLeft") moveLeft();
if(e.key==="Enter") games[index].querySelector("button").click();
});

update();

/* MUSIC */
const music=document.getElementById("music");
const musicBtn=document.getElementById("musicBtn");

musicBtn.onclick=()=>{
if(music.paused){
music.play();
musicBtn.innerText="⏸ Pause Music";
}else{
music.pause();
musicBtn.innerText="🎵 Play Music";
}
};

</script>

</body>
    </html>
