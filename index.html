<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Olive Gaming Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;
    background: #000;
}

/* STARFIELD */
#stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -10;
    background: radial-gradient(circle at top, #12002b, #000);
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite;
}

@keyframes twinkle {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}

/* HEADER */
header {
    text-align: center;
    padding: 25px 10px;
}

header h1 {
    font-size: 32px;
    text-shadow: 0 0 20px #8a2be2;
}

header p {
    opacity: 0.7;
}

/* SATURN */
.saturn {
    position: fixed;
    top: 10%;
    right: -120px;
    width: 320px;
    height: 320px;
    animation: float 6s ease-in-out infinite;
}

.saturn::before {
    content: "";
    position: absolute;
    width: 180px;
    height: 180px;
    top: 70px;
    left: 70px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffd9a0, #ff9a3c, #6b2d00);
}

.saturn::after {
    content: "";
    position: absolute;
    width: 320px;
    height: 120px;
    top: 100px;
    left: 0;
    border-radius: 50%;
    border: 4px solid rgba(255,220,160,0.6);
}

/* MENU */
.menu {
    display: flex;
    overflow-x: hidden;
    gap: 20px;
    padding: 30px;
    margin-left: 90px;
}

/* 🎮 RGB ANIMATED GAMES */
.game {
    min-width: 180px;
    background: rgba(255,255,255,0.05);
    border: 2px solid;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;

    animation: rgbBorder 6s linear infinite;
}

@keyframes rgbBorder {
    0%   { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
    25%  { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
    50%  { border-color: #00ffff; box-shadow: 0 0 10px #00ffff; }
    75%  { border-color: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
    100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
}

.game.selected {
    transform: scale(1.3);
    box-shadow: 0 0 40px #ffffff;
}

/* BUTTONS */
button {
    margin-top: 10px;
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    color: white;
    background: #00c3ff;
    box-shadow: 0 0 10px #00c3ff, 0 0 25px #00c3ff;
    cursor: pointer;
}

/* MUSIC */
#musicBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 12px;
    background: #8a2be2;
    color: white;
    border: none;
    border-radius: 10px;
}

/* 🟢 ARROWS */
.navBtn {
    position: fixed;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 999;
}

.navBtn button {
    width: 55px;
    height: 55px;
    font-size: 22px;

    background: #001a00;
    border: 2px solid #00ff66;
    color: #00ff66;

    box-shadow: 0 0 10px #00ff66, 0 0 25px #00ff66;
    border-radius: 12px;
}

</style>
</head>

<body>

<div id="stars"></div>
<div class="saturn"></div>

<header>
<h1>OLIVE CLASS GAMING HUB</h1>
<p>made by moiz</p>
</header>

<!-- ARROWS -->
<div class="navBtn">
<button onclick="moveLeft()">⬅</button>
<button onclick="moveRight()">➡</button>
</div>

<!-- MENU -->
<div class="menu">

<!-- 25 GAMES + HUBS -->
<div class="game"><h3>Roblox</h3><button onclick="window.open('https://roblox.com','_blank')">Play</button></div>
<div class="game"><h3>Minecraft</h3><button onclick="window.open('https://minecraft.net','_blank')">Play</button></div>
<div class="game"><h3>Fortnite</h3><button onclick="window.open('https://fortnite.com','_blank')">Play</button></div>
<div class="game"><h3>Valorant</h3><button onclick="window.open('https://playvalorant.com','_blank')">Play</button></div>
<div class="game"><h3>CS2</h3><button onclick="window.open('https://counter-strike.net','_blank')">Play</button></div>

<div class="game"><h3>Rocket League</h3><button onclick="window.open('https://rocketleague.com','_blank')">Play</button></div>
<div class="game"><h3>GTA V</h3><button onclick="window.open('https://rockstargames.com','_blank')">Play</button></div>
<div class="game"><h3>COD</h3><button onclick="window.open('https://callofduty.com','_blank')">Play</button></div>
<div class="game"><h3>FIFA</h3><button onclick="window.open('https://ea.com','_blank')">Play</button></div>
<div class="game"><h3>Among Us</h3><button onclick="window.open('https://innersloth.com','_blank')">Play</button></div>

<div class="game"><h3>Fall Guys</h3><button onclick="window.open('https://fallguys.com','_blank')">Play</button></div>
<div class="game"><h3>Subway Surfers</h3><button onclick="window.open('https://poki.com/en/g/subway-surfers','_blank')">Play</button></div>
<div class="game"><h3>Temple Run</h3><button onclick="window.open('https://poki.com/en/g/temple-run-2','_blank')">Play</button></div>
<div class="game"><h3>Geometry Dash</h3><button onclick="window.open('https://geometrydash.io','_blank')">Play</button></div>
<div class="game"><h3>Clash Royale</h3><button onclick="window.open('https://supercell.com/en/games/clashroyale','_blank')">Play</button></div>

<div class="game"><h3>Brawl Stars</h3><button onclick="window.open('https://supercell.com/en/games/brawlstars','_blank')">Play</button></div>
<div class="game"><h3>Stumble Guys</h3><button onclick="window.open('https://stumbleguys.com','_blank')">Play</button></div>
<div class="game"><h3>Shell Shockers</h3><button onclick="window.open('https://shellshock.io','_blank')">Play</button></div>
<div class="game"><h3>Krunker</h3><button onclick="window.open('https://krunker.io','_blank')">Play</button></div>
<div class="game"><h3>Venge.io</h3><button onclick="window.open('https://venge.io','_blank')">Play</button></div>

<div class="game"><h3>Poki Hub</h3><button onclick="window.open('https://poki.com','_blank')">500+ Games</button></div>
<div class="game"><h3>CrazyGames</h3><button onclick="window.open('https://crazygames.com','_blank')">500+ Games</button></div>
<div class="game"><h3>Coolmath</h3><button onclick="window.open('https://coolmathgames.com','_blank')">500+ Games</button></div>
<div class="game"><h3>Miniclip</h3><button onclick="window.open('https://miniclip.com','_blank')">500+ Games</button></div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🎵 Play Music</button>

<script>

const games=document.querySelectorAll(".game");
let index=0;

function update(){
games.forEach(g=>g.classList.remove("selected"));
if(games[index]){
games[index].classList.add("selected");
games[index].scrollIntoView({behavior:"smooth",inline:"center"});
}
}

update();

function moveLeft(){
index=(index-1+games.length)%games.length;
update();
}

function moveRight(){
index=(index+1)%games.length;
update();
}

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowRight"||e.key==="d") moveRight();
if(e.key==="ArrowLeft"||e.key==="a") moveLeft();

if(e.key==="Enter"){
games[index].querySelector("button").click();
}

});

/* MUSIC */
const music=document.getElementById("music");
const btn=document.getElementById("musicBtn");

btn.onclick=()=>{
if(music.paused){
music.play();
btn.innerText="⏸ Pause Music";
}else{
music.pause();
btn.innerText="🎵 Play Music";
}
};

</script>

</body>
                                       </html>
