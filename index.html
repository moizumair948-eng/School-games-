<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Olive Class Gaming Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;
    background: radial-gradient(circle at top, #12002b, #000);
}

/* STARFIELD */
#stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -10;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite;
}

@keyframes twinkle {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}

/* SATURN */
.saturn {
    position: fixed;
    top: 10%;
    right: -120px;
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, #ffb86b, #ff7b00, #4a1f00);
    border-radius: 50%;
    animation: float 6s ease-in-out infinite;
}

@keyframes float {
    50% { transform: translateY(20px); }
}

/* MENU */
.menu {
    display: flex;
    gap: 20px;
    padding: 30px;
    margin-left: 90px;
    overflow: hidden;
}

/* RGB CARDS */
.game {
    min-width: 180px;
    padding: 15px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    border: 2px solid;
    animation: rgb 6s linear infinite;
    text-align: center;
    transition: 0.3s;
}

@keyframes rgb {
    0%   { border-color: red; box-shadow: 0 0 10px red; }
    25%  { border-color: lime; box-shadow: 0 0 10px lime; }
    50%  { border-color: cyan; box-shadow: 0 0 10px cyan; }
    75%  { border-color: magenta; box-shadow: 0 0 10px magenta; }
    100% { border-color: red; box-shadow: 0 0 10px red; }
}

.game.selected {
    transform: scale(1.25);
    box-shadow: 0 0 35px white;
}

/* BUTTONS */
button {
    margin-top: 10px;
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    background: #00c3ff;
    color: white;
    box-shadow: 0 0 10px #00c3ff;
}

/* ARROWS */
.navBtn {
    position: fixed;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.navBtn button {
    width: 55px;
    height: 55px;
    background: black;
    border: 2px solid #00ff66;
    color: #00ff66;
    font-size: 22px;
    box-shadow: 0 0 10px #00ff66;
}

/* MUSIC */
#musicBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #8a2be2;
    color: white;
}

</style>
</head>

<body>

<div id="stars"></div>
<div class="saturn"></div>

<div class="navBtn">
<button onclick="moveLeft()">⬅</button>
<button onclick="moveRight()">➡</button>
</div>

<header>
<h1>OLIVE CLASS GAMING HUB</h1>
<p>made by moiz</p>
</header>

<div class="menu">

<div class="game"><h3>Poki</h3><button onclick="window.open('https://poki.com','_blank')">Play</button></div>
<div class="game"><h3>CrazyGames</h3><button onclick="window.open('https://crazygames.com','_blank')">Play</button></div>
<div class="game"><h3>Y8</h3><button onclick="window.open('https://y8.com','_blank')">Play</button></div>
<div class="game"><h3>Miniclip</h3><button onclick="window.open('https://miniclip.com','_blank')">Play</button></div>

<div class="game"><h3>Slither.io</h3><button onclick="window.open('https://slither.io','_blank')">Play</button></div>
<div class="game"><h3>Agar.io</h3><button onclick="window.open('https://agar.io','_blank')">Play</button></div>
<div class="game"><h3>2048</h3><button onclick="window.open('https://play2048.co','_blank')">Play</button></div>
<div class="game"><h3>Tetris</h3><button onclick="window.open('https://tetris.com/play-tetris','_blank')">Play</button></div>
<div class="game"><h3>Dino</h3><button onclick="window.open('https://chromedino.com','_blank')">Play</button></div>

<div class="game"><h3>Shell Shockers</h3><button onclick="window.open('https://shellshock.io','_blank')">Play</button></div>
<div class="game"><h3>Krunker</h3><button onclick="window.open('https://krunker.io','_blank')">Play</button></div>
<div class="game"><h3>Venge</h3><button onclick="window.open('https://venge.io','_blank')">Play</button></div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🎵 Play Music</button>

<script>

const games=document.querySelectorAll(".game");
let index=0;

function update(){
games.forEach(g=>g.classList.remove("selected"));
if(games[index]){
games[index].classList.add("selected");
games[index].scrollIntoView({behavior:"smooth",inline:"center"});
}
}

/* 🎧 FAHH + BASS SOUND ENGINE */
function playSwitchSound(dir){

const ctx = new (window.AudioContext || window.webkitAudioContext)();

const osc = ctx.createOscillator();
const gain = ctx.createGain();
const bass = ctx.createOscillator();

osc.type = "sawtooth";
osc.frequency.setValueAtTime(dir > 0 ? 600 : 300, ctx.currentTime);

bass.type = "sine";
bass.frequency.setValueAtTime(80, ctx.currentTime);

gain.gain.setValueAtTime(0.2, ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);

osc.connect(gain);
bass.connect(gain);
gain.connect(ctx.destination);

osc.start();
bass.start();

osc.stop(ctx.currentTime + 0.4);
bass.stop(ctx.currentTime + 0.4);
}

function moveLeft(){
index=(index-1+games.length)%games.length;
update();
playSwitchSound(-1);
}

function moveRight(){
index=(index+1)%games.length;
update();
playSwitchSound(1);
}

document.addEventListener("keydown",(e)=>{
if(e.key==="ArrowRight"||e.key==="d") moveRight();
if(e.key==="ArrowLeft"||e.key==="a") moveLeft();
if(e.key==="Enter") games[index].querySelector("button").click();
});

update();

/* MUSIC */
const music=document.getElementById("music");
const btn=document.getElementById("musicBtn");

btn.onclick=()=>{
if(music.paused){
music.play();
btn.innerText="⏸ Pause Music";
}else{
music.pause();
btn.innerText="🎵 Play Music";
}
};

</script>

</body>
    </html>
