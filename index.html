<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f172a, #1e3a8a, #111827);
  color: white;
}

header {
  text-align: center;
  padding: 30px;
  background: rgba(0,0,0,0.4);
}

header h1 {
  color: #00d4ff;
  text-shadow: 0 0 15px #00d4ff;
  font-size: 3rem;
}

nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 10px;
  background: #111827;
}

nav a {
  color: white;
  text-decoration: none;
}

.card {
  width: 90%;
  max-width: 1100px;
  margin: 20px auto;
  background: #1f2937;
  padding: 20px;
  border-radius: 15px;
}

.games {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.game {
  background: #374151;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

button {
  padding: 10px;
  border: none;
  background: #00bfff;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #0099cc;
}

footer {
  text-align: center;
  padding: 20px;
  background: #111827;
}
</style>
