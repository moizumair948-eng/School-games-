<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>olive class gaming hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:black;
color:white;
overflow:hidden;
}

canvas{
position:fixed;
inset:0;
z-index:-1;
opacity:1;
}

/* HEADER */
header{
text-align:center;
padding:20px;
text-shadow:0 0 20px cyan;
}

header h1{
margin:0;
font-size:20px;
text-transform:lowercase;
}

header p{
margin:0;
font-size:11px;
opacity:0.7;
text-transform:lowercase;
}

/* MENU */
.menu{
display:flex;
gap:20px;
padding:30px;
margin-left:40px;
overflow-x:auto;
}

.track{
display:flex;
gap:20px;
transition:0.5s;
}

.game{
min-width:170px;
padding:15px;
border-radius:12px;
background:rgba(255,255,255,0.04);
border:2px solid #00ffff;
text-align:center;
transition:0.25s;
transform:scale(0.9);
opacity:0.6;
}

.game.selected{
transform:scale(1.15);
opacity:1;
box-shadow:0 0 30px cyan;
border-color:#ff00ff;
}

/* D-PAD */
.dpad{
position:fixed;
bottom:140px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:25px;
z-index:10;
}

.dpad button{
width:75px;
height:75px;
font-size:26px;
border-radius:16px;
border:2px solid #00ffff;
background:rgba(0,0,0,0.5);
color:#00ffff;
box-shadow:0 0 15px #00ffff;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
font-weight:700;
transition:0.2s;
}

.dpad button:active{
transform:scale(0.92);
}

/* CONTROLS */
#controls{
position:fixed;
bottom:20px;
right:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:20;
}

#musicBtn{
padding:12px;
border:2px solid #ff00ff;
background:rgba(0,0,0,0.6);
color:#ff00ff;
box-shadow:0 0 15px #ff00ff;
cursor:pointer;
transition:0.2s;
}

#speed{
width:140px;
accent-color:#00ffff;
}

label{
color:#00ffff;
font-size:12px;
}

#secretInput{
width:140px;
padding:6px;
border:2px solid #00ffff;
background:black;
color:#00ffff;
outline:none;
border-radius:6px;
font-family:Orbitron;
font-size:11px;
box-shadow:0 0 10px #00ffff;
}

/* NEON FIX */
button{
font-family:'Orbitron',sans-serif;
transition:0.2s;
}

.game button{
margin-top:10px;
padding:10px 14px;
border-radius:10px;
border:2px solid #00ffff;
background:rgba(0,0,0,0.6);
color:#00ffff;
box-shadow:0 0 12px #00ffff;
cursor:pointer;
}

.game button:hover{
box-shadow:0 0 25px #00ffff, 0 0 40px #00ffff;
transform:scale(1.05);
}

#musicBtn:hover{
box-shadow:0 0 25px #ff00ff, 0 0 45px #ff00ff;
transform:scale(1.05);
}

.dpad button:hover{
box-shadow:0 0 25px #00ffff, 0 0 45px #00ffff;
transform:scale(1.08);
}

#secretInput:focus{
box-shadow:0 0 25px #00ffff, 0 0 40px #ff00ff;
transform:scale(1.02);
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<header>
<h1>olive class gaming hub</h1>
<p>created by moiz</p>
</header>

<div class="menu">
<div class="track" id="track"></div>
</div>

<div class="dpad">
<button onclick="move(-1)">⬅</button>
<button onclick="move(1)">➡</button>
</div>

<div id="controls">

<button id="musicBtn">🎵 music</button>

<label>star speed</label>
<input id="speed" type="range" min="0.2" max="3" step="0.1" value="1">

<label>secret code</label>
<input id="secretInput" type="text" placeholder="enter code...">

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
window.addEventListener("resize",resize);
resize();

let speedControl=1;
let musicBoost=0;
let secretMode=false;
let rainbowMode=false;

document.getElementById("speed").addEventListener("input",(e)=>{
speedControl=parseFloat(e.target.value);
});

let stars=Array(120).fill().map(()=>({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
r:Math.random()*1.6,
s:0.4+Math.random()*1.0
}));

let t=0;

//////////////////////////////////////////////////////
// 🎵 MUSIC SYSTEM
//////////////////////////////////////////////////////

const music=document.getElementById("music");
const musicBtn=document.getElementById("musicBtn");

let musicOn=false;

const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
const source=audioCtx.createMediaElementSource(music);
const analyser=audioCtx.createAnalyser();

analyser.fftSize=256;

source.connect(analyser);
analyser.connect(audioCtx.destination);

const data=new Uint8Array(analyser.frequencyBinCount);

musicBtn.onclick=async()=>{
await audioCtx.resume();

if(!musicOn){
music.play();
musicOn=true;
musicBtn.innerText="⏸ music";
}else{
music.pause();
musicOn=false;
musicBtn.innerText="🎵 music";
}
};

//////////////////////////////////////////////////////
// 🔐 SECRET CODE → RAINBOW MODE
//////////////////////////////////////////////////////

const secretInput=document.getElementById("secretInput");

secretInput.addEventListener("keydown",(e)=>{
if(e.key==="Enter"){
let val=secretInput.value.toLowerCase().trim();

if(val==="safwaan"){

rainbowMode=true;
secretInput.value="⚡ rainbow mode";

let start=Date.now();

const interval=setInterval(()=>{

let hue=(Date.now()/10)%360;

/* screen rainbow warp */
document.body.style.filter=`hue-rotate(${hue}deg) saturate(3) brightness(1.3)`;

/* boost motion */
musicBoost=1.2;

if(Date.now()-start>60000){
clearInterval(interval);
rainbowMode=false;
musicBoost=0;
document.body.style.filter="none";
secretInput.value="";
}
},50);
}
}
});

//////////////////////////////////////////////////////
// 🌌 DRAW LOOP
//////////////////////////////////////////////////////

function draw(){
t+=0.002;

/* MUSIC ENERGY */
if(musicOn){
analyser.getByteFrequencyData(data);
let sum=0;
for(let i=0;i<data.length;i++) sum+=data[i];
musicBoost = (sum / data.length) / 70;
}

/* BACKGROUND */
let g=ctx.createRadialGradient(
canvas.width/2,canvas.height/2,0,
canvas.width/2,canvas.height/2,canvas.width
);

g.addColorStop(0, rainbowMode
? `rgba(${Math.random()*255},${Math.random()*255},255,0.5)`
: "rgba(60,0,120,0.35)"
);

g.addColorStop(0.3,"rgba(0,80,160,0.25)");
g.addColorStop(0.6,"rgba(0,0,0,0.85)");
g.addColorStop(1,"black");

ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

/* STARS */
for(let s of stars){

let finalSpeed = speedControl + musicBoost;

if(rainbowMode) finalSpeed *= 2;

s.y += s.s * finalSpeed;
s.x += Math.sin(t+s.y*0.01)*0.2;

if(s.y>canvas.height)s.y=0;

ctx.fillStyle=`rgba(0,255,255,${musicOn ? 0.7 : 0.5})`;
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
}

requestAnimationFrame(draw);
}

draw();

/* GAME SYSTEM (UNCHANGED) */
const games=[
"Poki","CrazyGames","Y8","Miniclip","Armor Games",
"Slither","Agar","2048","Tetris","Dino",
"Shell Shockers","Krunker","Venge","1v1.lol","Zombs",
"Paper.io","Diep.io","Bonk.io","Hole.io","Run 3",
"Roblox","Coolmath","Stickman Hook","Fireboy","More"
];

const links={
"Poki":"https://poki.com",
"CrazyGames":"https://crazygames.com",
"Y8":"https://y8.com",
"Miniclip":"https://miniclip.com",
"Armor Games":"https://armorgames.com",
"Slither":"https://slither.io",
"Agar":"https://agar.io",
"2048":"https://play2048.co",
"Tetris":"https://tetris.com",
"Dino":"https://chromedino.com",
"Shell Shockers":"https://shellshock.io",
"Krunker":"https://krunker.io",
"Venge":"https://venge.io",
"1v1.lol":"https://1v1.lol",
"Zombs":"https://zombsroyale.io",
"Paper.io":"https://paper-io.com",
"Diep.io":"https://diep.io",
"Bonk.io":"https://bonk.io",
"Hole.io":"https://hole-io.com",
"Run 3":"https://run3.io",
"Roblox":"https://roblox.com",
"Coolmath":"https://coolmathgames.com",
"Stickman Hook":"https://poki.com/en/g/stickman-hook",
"Fireboy":"https://poki.com/en/g/fireboy-and-watergirl-forest-temple",
"More":"https://poki.com"
};

const track=document.getElementById("track");

games.forEach(g=>{
let div=document.createElement("div");
div.className="game";
div.innerHTML=`<h3>${g}</h3><button onclick="openGame('${g}')">play</button>`;
track.appendChild(div);
});

const cards=document.querySelectorAll(".game");
let index=0;

function update(){
cards.forEach((c,i)=>{
c.classList.remove("selected");
if(i===index)c.classList.add("selected");
});

track.style.transform=`translateX(${-index * 190}px)`;
}

function move(dir){
index=(index+dir+cards.length)%cards.length;
update();
}

function openGame(name){
window.open(links[name] || "https://poki.com","_blank");
}

update();

</script>

</body>
  </html>
