<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>olive class gaming hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:black;
color:white;
overflow:hidden;
}

canvas{
position:fixed;
inset:0;
z-index:-1;
}


/* INTRO */

.intro{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:black;
z-index:999;
font-size:35px;
color:#00ffff;
text-shadow:0 0 10px cyan,0 0 30px cyan;
animation:introFade 3s forwards;
}

@keyframes introFade{

0%{
opacity:1;
}

80%{
opacity:1;
}

100%{
opacity:0;
pointer-events:none;
}

}


/* HEADER */

header{
text-align:center;
padding:20px;
text-shadow:0 0 20px cyan;
}

header h1{
margin:0;
font-size:22px;
text-transform:lowercase;
}

header p{
margin:5px;
font-size:11px;
opacity:.7;
}


/* GAME AREA */

.menu{
display:flex;
padding:30px;
margin-left:40px;
overflow:hidden;
}

.track{
display:flex;
gap:20px;
transition:.5s;
}

.game{
min-width:170px;
padding:15px;
border-radius:12px;
background:rgba(255,255,255,.05);
border:2px solid cyan;
text-align:center;
opacity:.6;
transform:scale(.9);
transition:.25s;
}

.game.selected{
opacity:1;
transform:scale(1.15);
border-color:#ff00ff;
box-shadow:0 0 25px cyan,0 0 40px magenta;
}

.game button{
margin-top:10px;
padding:10px 15px;
border-radius:10px;
border:2px solid cyan;
background:black;
color:#00ffff;
font-family:Orbitron;
box-shadow:0 0 15px cyan;
cursor:pointer;
}


/* DPAD */

.dpad{
position:fixed;
bottom:150px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:25px;
}

.dpad button{
width:75px;
height:75px;
font-size:28px;
border-radius:20px;
background:black;
color:#00ffff;
border:2px solid cyan;
box-shadow:0 0 20px cyan;
}


/* CONTROL PANEL */

#controls{
position:fixed;
right:20px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
padding:15px;
background:rgba(0,0,0,.5);
border-radius:15px;
border:1px solid cyan;
backdrop-filter:blur(8px);
box-shadow:0 0 20px cyan;
}


#musicBtn{
padding:12px;
border-radius:10px;
background:black;
color:#ff00ff;
border:2px solid #ff00ff;
box-shadow:0 0 20px #ff00ff;
cursor:pointer;
}

#volume,
#speed{
width:150px;
}

#volume{
accent-color:#ff00ff;
}

#speed{
accent-color:#00ffff;
}


label{
font-size:12px;
color:#00ffff;
}
/* MUSIC VISUALIZER */

.visualizer{
display:flex;
gap:5px;
height:50px;
align-items:end;
}

.bar{
width:8px;
height:10px;
background:#00ffff;
box-shadow:0 0 15px cyan;
}


/* SECRET CODE */

#secretInput{
width:150px;
padding:7px;
background:black;
color:#00ffff;
border:2px solid cyan;
border-radius:8px;
font-family:Orbitron;
outline:none;
}


/* BUTTON EFFECTS */

button{
font-family:'Orbitron',sans-serif;
transition:.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px cyan;
}


</style>

</head>


<body>


<div class="intro">
OLIVE CLASS GAMING HUB
</div>


<canvas id="bg"></canvas>


<header>
<h1>olive class gaming hub</h1>
<p>created by moiz</p>
</header>



<div class="menu">

<div class="track" id="track"></div>

</div>



<div class="dpad">

<button onclick="move(-1)">⬅</button>

<button onclick="move(1)">➡</button>

</div>



<div id="controls">


<button id="musicBtn">
🎵 music
</button>


<label>volume</label>

<input id="volume" type="range" min="0" max="1" step="0.01" value="0.7">



<label>star speed</label>

<input id="speed" type="range" min="0.2" max="3" step="0.1" value="1">



<div class="visualizer">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>



<label>secret code</label>

<input id="secretInput" placeholder="enter code...">


</div>



<audio id="music"></audio>



<script>


const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");


function resize(){

canvas.width=innerWidth;
canvas.height=innerHeight;

}

window.addEventListener("resize",resize);
resize();



/* STAR SYSTEM */

let speedControl=1;
let musicPower=0;


document.getElementById("speed").oninput=(e)=>{

speedControl=parseFloat(e.target.value);

};



let stars=Array(150).fill().map(()=>({

x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
r:Math.random()*1.8,
s:0.5+Math.random()

}));




function drawStars(){

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);



for(let s of stars){


let boost=speedControl+(musicPower/80);


s.y+=s.s*boost;


if(s.y>canvas.height){

s.y=0;

}


ctx.fillStyle=`rgba(0,255,255,.7)`;

ctx.beginPath();

ctx.arc(
s.x,
s.y,
s.r,
0,
Math.PI*2
);

ctx.fill();


}



requestAnimationFrame(drawStars);

}

drawStars();





/* MUSIC SYSTEM */


const music=document.getElementById("music");
const musicBtn=document.getElementById("musicBtn");
const volume=document.getElementById("volume");


const songs=[

"music/4 RAWS.mp3",
"music/Why You Bulleh Me Phonk.mp3",
"music/Misery.mp3",
"music/Meant To Be.mp3"

];


let songIndex=0;
let musicOn=false;


music.src=songs[songIndex];


volume.oninput=()=>{

music.volume=volume.value;

};


const audioCtx=
new(window.AudioContext||window.webkitAudioContext)();


const source=
audioCtx.createMediaElementSource(music);


const analyser=
audioCtx.createAnalyser();


analyser.fftSize=256;


source.connect(analyser);

analyser.connect(audioCtx.destination);


const data=
new Uint8Array(analyser.frequencyBinCount);




musicBtn.onclick=async()=>{


await audioCtx.resume();


if(!musicOn){


music.play();

musicOn=true;

musicBtn.innerHTML="⏸ pause music";


}else{


music.pause();

musicOn=false;

musicBtn.innerHTML="🎵 music";


}


};




music.onended=()=>{


songIndex++;


if(songIndex>=songs.length){

songIndex=0;

}


music.src=songs[songIndex];


if(musicOn){

music.play();

}

};





/* VISUALIZER */


const bars=document.querySelectorAll(".bar");



function visualizer(){


if(musicOn){


analyser.getByteFrequencyData(data);


let total=0;


for(let i=0;i<data.length;i++){

total+=data[i];

}


musicPower=total/data.length;



bars.forEach((bar,i)=>{

bar.style.height=
(10+data[i])+"px";


});


}else{


musicPower=0;


}



requestAnimationFrame(visualizer);

}


visualizer();





/* SECRET MODE */


const secretInput=
document.getElementById("secretInput");


secretInput.addEventListener("keydown",(e)=>{


if(e.key==="Enter"){


let code=
secretInput.value.toLowerCase().trim();



if(code==="safwaan"){


document.body.style.filter=
"hue-rotate(90deg)";


secretInput.value=
"⚡ rainbow mode";


setTimeout(()=>{


document.body.style.filter="none";

secretInput.value="";


},60000);



}


}


});





/* GAME SYSTEM */


const games=[

"Poki",
"CrazyGames",
"Y8",
"Miniclip",
"Roblox",
"Coolmath",
"Slither",
"Agar",
"2048",
"Tetris",
"Krunker",
"Venge",
"1v1.lol",
"Run 3"

];



const links={

"Poki":"https://poki.com",
"CrazyGames":"https://crazygames.com",
"Y8":"https://y8.com",
"Miniclip":"https://miniclip.com",
"Roblox":"https://roblox.com",
"Coolmath":"https://coolmathgames.com",
"Slither":"https://slither.io",
"Agar":"https://agar.io",
"2048":"https://play2048.co",
"Tetris":"https://tetris.com",
"Krunker":"https://krunker.io",
"Venge":"https://venge.io",
"1v1.lol":"https://1v1.lol",
"Run 3":"https://run3.io"

};



const track=document.getElementById("track");


games.forEach(game=>{


let card=document.createElement("div");


card.className="game";


card.innerHTML=

`<h3>${game}</h3>
<button onclick="openGame('${game}')">
play
</button>`;


track.appendChild(card);


});



const cards=
document.querySelectorAll(".game");


let index=0;



function update(){

cards.forEach((card,i)=>{

card.classList.remove("selected");


if(i===index){

card.classList.add("selected");

}

});


track.style.transform=
`translateX(${-index*190}px)`;

}



function move(dir){

index=(index+dir+cards.length)%cards.length;

update();

}



function openGame(name){

window.open(
links[name],
"_blank"
);

}



update();


</script>


</body>

</html>
