<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Olive Class Gaming Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:black;
color:white;
overflow:hidden;
}

/* 🌌 CANVAS */
canvas{
position:fixed;
inset:0;
z-index:-10;
opacity:0;
transition:2s;
}

/* HEADER */
header{
text-align:center;
padding:20px;
text-shadow:0 0 20px cyan;
opacity:0;
transition:2s;
}

/* MENU */
.menu{
display:flex;
gap:20px;
padding:30px;
margin-left:90px;
overflow-x:auto;
opacity:0;
transition:2s;
}

.game{
min-width:180px;
padding:15px;
border-radius:12px;
background:rgba(255,255,255,0.04);
border:2px solid #00ffff;
text-align:center;
transition:0.2s;
}

.game.selected{
transform:scale(1.3);
box-shadow:0 0 50px cyan;
}

/* BUTTON */
button{
margin-top:10px;
padding:10px 14px;
border-radius:10px;
border:2px solid #00ffff;
background:rgba(0,0,0,0.5);
color:#00ffff;
box-shadow:0 0 15px #00ffff;
cursor:pointer;
}

/* 🎮 CONTROLLER */
.controller{
position:fixed;
left:10px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:10px;
z-index:10;
opacity:0;
transition:2s;
}

.controller button{
width:70px;
height:70px;
font-size:24px;
border-radius:14px;
}

.action button{
width:140px;
height:60px;
border:2px solid #ff00ff;
color:#ff00ff;
box-shadow:0 0 25px #ff00ff;
}

/* MUSIC */
#musicBtn{
position:fixed;
bottom:20px;
right:20px;
padding:12px;
border:2px solid #ff00ff;
background:black;
color:#ff00ff;
box-shadow:0 0 20px #ff00ff;
opacity:0;
transition:2s;
}

</style>
</head>

<body>

<!-- BOOT -->
<div id="boot"
style="position:fixed;inset:0;background:black;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:999;color:white;">
<h1>BOOTING SYSTEM</h1>
<div style="width:300px;height:8px;border:2px solid cyan;">
<div id="fill" style="width:0%;height:100%;background:cyan;"></div>
</div>
<p id="percent">0%</p>
</div>

<canvas id="space"></canvas>

<header>
<h1>OLIVE CLASS GAMING HUB</h1>
<p>cinematic neon system</p>
</header>

<!-- CONTROLLER -->
<div class="controller">
<button onclick="move(-1)">⬅</button>
<button onclick="move(1)">➡</button>
<div class="action">
<button onclick="activateGame()">SELECT</button>
</div>
</div>

<div class="menu">

<!-- 25 GAMES -->
<div class="game"><h3>Poki</h3><button onclick="go('https://poki.com')">Play</button></div>
<div class="game"><h3>CrazyGames</h3><button onclick="go('https://crazygames.com')">Play</button></div>
<div class="game"><h3>Y8</h3><button onclick="go('https://y8.com')">Play</button></div>
<div class="game"><h3>Miniclip</h3><button onclick="go('https://miniclip.com')">Play</button></div>
<div class="game"><h3>Armor Games</h3><button onclick="go('https://armorgames.com')">Play</button></div>

<div class="game"><h3>Slither</h3><button onclick="go('https://slither.io')">Play</button></div>
<div class="game"><h3>Agar</h3><button onclick="go('https://agar.io')">Play</button></div>
<div class="game"><h3>2048</h3><button onclick="go('https://play2048.co')">Play</button></div>
<div class="game"><h3>Tetris</h3><button onclick="go('https://tetris.com')">Play</button></div>
<div class="game"><h3>Dino</h3><button onclick="go('https://chromedino.com')">Play</button></div>

<div class="game"><h3>Shell Shockers</h3><button onclick="go('https://shellshock.io')">Play</button></div>
<div class="game"><h3>Krunker</h3><button onclick="go('https://krunker.io')">Play</button></div>
<div class="game"><h3>Venge</h3><button onclick="go('https://venge.io')">Play</button></div>
<div class="game"><h3>1v1.lol</h3><button onclick="go('https://1v1.lol')">Play</button></div>
<div class="game"><h3>Zombs Royale</h3><button onclick="go('https://zombsroyale.io')">Play</button></div>

<div class="game"><h3>Paper.io</h3><button onclick="go('https://paper-io.com')">Play</button></div>
<div class="game"><h3>Diep.io</h3><button onclick="go('https://diep.io')">Play</button></div>
<div class="game"><h3>Bonk.io</h3><button onclick="go('https://bonk.io')">Play</button></div>
<div class="game"><h3>Hole.io</h3><button onclick="go('https://hole-io.com')">Play</button></div>
<div class="game"><h3>Run 3</h3><button onclick="go('https://run3.io')">Play</button></div>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🎵 Play Music</button>

<script>

/* 🌌 GALAXY */
const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

const stars=Array(600).fill().map(()=>({
angle:Math.random()*Math.PI*2,
radius:Math.random()*canvas.width,
speed:0.002+Math.random()*0.003,
size:Math.random()*2,
layer:Math.random()
}));

let t=0;

/* DRAW */
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
t+=0.003;

const g=ctx.createRadialGradient(
canvas.width/2,
canvas.height/2,
100,
canvas.width/2,
canvas.height/2,
canvas.width
);

g.addColorStop(0,"rgba(0,255,255,0.12)");
g.addColorStop(0.5,"rgba(255,0,255,0.06)");
g.addColorStop(1,"black");

ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let s of stars){

s.angle+=s.speed;

let x=canvas.width/2 + Math.cos(s.angle)*s.radius;
let y=canvas.height/2 + Math.sin(s.angle)*s.radius;

x+=Math.sin(t)*20*s.layer;
y+=Math.cos(t)*20*s.layer;

ctx.fillStyle=`rgba(0,255,255,${1-s.radius/canvas.width})`;
ctx.shadowBlur=20;
ctx.shadowColor="#00ffff";

ctx.fillRect(x,y,s.size,s.size);
}

requestAnimationFrame(draw);
}

/* NAV */
const games=document.querySelectorAll(".game");
let index=0;

function update(){
games.forEach(g=>g.classList.remove("selected"));
games[index].classList.add("selected");
games[index].scrollIntoView({behavior:"smooth",inline:"center"});
}

function move(d){
index=(index+d+games.length)%games.length;
update();
}

function go(url){
window.open(url,"_blank");
}

function activateGame(){
games[index].querySelector("button").click();
}

/* MUSIC */
const music=document.getElementById("music");
const musicBtn=document.getElementById("musicBtn");

const audioCtx=new (window.AudioContext||window.webkitAudioContext)();
const source=audioCtx.createMediaElementSource(music);
const analyser=audioCtx.createAnalyser();
analyser.fftSize=256;

source.connect(analyser);
analyser.connect(audioCtx.destination);

const data=new Uint8Array(analyser.frequencyBinCount);

function beat(){
analyser.getByteFrequencyData(data);
let sum=0;
for(let i=0;i<data.length;i++)sum+=data[i];
let b=sum/data.length/255;

document.body.style.filter=`brightness(${1+b*0.3})`;

games.forEach(g=>{
g.style.transform=`scale(${1+b*0.04})`;
});

requestAnimationFrame(beat);
}

musicBtn.onclick=async()=>{
await audioCtx.resume();
if(music.paused){
music.play();
beat();
musicBtn.innerText="⏸ Pause Music";
}else{
music.pause();
musicBtn.innerText="🎵 Play Music";
}
};

/* 🔥 SAFWAAN EASTER EGG */
let secret="";
document.addEventListener("keydown",(e)=>{
secret+=e.key.toLowerCase();
if(secret.includes("safwaan")){
document.body.style.filter="hue-rotate(200deg) saturate(3)";
}
});

/* 🎬 BOOT INTRO */
let p=0;
const fill=document.getElementById("fill");
const percent=document.getElementById("percent");
const boot=document.getElementById("boot");

function loading(){
p++;
fill.style.width=p+"%";
percent.innerText=p+"%";

if(p<100){
setTimeout(loading,25);
}else{
boot.style.opacity="0";
setTimeout(()=>boot.remove(),800);

canvas.style.opacity="1";
document.querySelector("header").style.opacity="1";
document.querySelector(".menu").style.opacity="1";
document.querySelector(".controller").style.opacity="1";
document.querySelector("#musicBtn").style.opacity="1";

draw();
}
}

loading();

</script>

</body>
                                     </html>
