<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>olive class gaming hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:black;
color:white;
overflow:hidden;
}

canvas{
position:fixed;
inset:0;
z-index:-1;
}


/* INTRO */

.intro{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:black;
z-index:9999;
font-size:35px;
color:#00ffff;
text-shadow:
0 0 10px cyan,
0 0 30px cyan;
animation:introFade 3s forwards;
}

@keyframes introFade{

0%{
opacity:1;
}

80%{
opacity:1;
}

100%{
opacity:0;
pointer-events:none;
}

}


/* HEADER */

header{
text-align:center;
padding:20px;
text-shadow:0 0 20px cyan;
}

header h1{
margin:0;
font-size:22px;
text-transform:lowercase;
}

header p{
margin:5px;
font-size:11px;
opacity:.7;
}


/* GAME MENU */

.menu{

display:flex;
gap:20px;
padding:30px;
margin-left:40px;
overflow:hidden;

}


.track{

display:flex;
gap:20px;
transition:.5s;

}


.game{

min-width:170px;

padding:15px;

border-radius:12px;

background:
rgba(255,255,255,.05);

border:2px solid #00ffff;

text-align:center;

transform:scale(.9);

opacity:.6;

transition:.25s;

}


.game.selected{

transform:scale(1.15);

opacity:1;

border-color:#ff00ff;

box-shadow:
0 0 20px cyan,
0 0 40px purple;

}



.game button{

margin-top:10px;

padding:10px 15px;

border-radius:10px;

border:2px solid cyan;

background:black;

color:#00ffff;

cursor:pointer;

font-family:Orbitron;

box-shadow:0 0 15px cyan;

}



.game button:hover{

transform:scale(1.1);

}


/* D PAD */


.dpad{

position:fixed;

bottom:150px;

left:50%;

transform:translateX(-50%);

display:flex;

gap:25px;

}


.dpad button{

width:75px;

height:75px;

font-size:28px;

border-radius:20px;

background:black;

color:#00ffff;

border:2px solid cyan;

box-shadow:0 0 20px cyan;

}



/* MUSIC PANEL */


#controls{

position:fixed;

bottom:20px;

right:20px;

display:flex;

flex-direction:column;

gap:10px;

background:
rgba(0,0,0,.5);

padding:15px;

border-radius:15px;

border:1px solid cyan;

backdrop-filter:blur(8px);

box-shadow:0 0 20px cyan;

}



#musicBtn{

padding:12px;

border-radius:10px;

border:2px solid magenta;

background:black;

color:magenta;

box-shadow:0 0 20px magenta;

cursor:pointer;

}



#volume{

width:150px;

accent-color:#ff00ff;

}


#speed{

width:150px;

accent-color:#00ffff;

}



label{

font-size:12px;

color:#00ffff;

}



/* MUSIC VISUALIZER */


.visualizer{

display:flex;

gap:5px;

height:50px;

align-items:end;

}



.bar{

width:8px;

height:10px;

background:#00ffff;

box-shadow:0 0 15px cyan;

}



/* SECRET */


#secretInput{

width:150px;

padding:7px;

background:black;

color:#00ffff;

border:2px solid cyan;

border-radius:8px;

font-family:Orbitron;

}



</style>

</head>


<body>


<div class="intro">
OLIVE CLASS GAMING HUB
</div>


<canvas id="bg"></canvas>


<header>

<h1>olive class gaming hub</h1>

<p>created by moiz</p>

</header>


<div class="menu">

<div class="track" id="track"></div>

</div>



<div class="dpad">

<button onclick="move(-1)">⬅</button>

<button onclick="move(1)">➡</button>

</div>




<div id="controls">


<button id="musicBtn">
🎵 music
</button>


<label>
volume
</label>

<input id="volume" type="range" min="0" max="1" step="0.01" value="0.7">


<label>
star speed
</label>

<input id="speed" type="range" min="0.2" max="3" step="0.1" value="1">


<div class="visualizer">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>


<label>
secret code
</label>


<input id="secretInput" placeholder="enter code...">


</div>



<audio id="music"></audio>

<script>
<script>

/* ==========================
   MUSIC ENGINE
========================== */


const music=document.getElementById("music");
const musicBtn=document.getElementById("musicBtn");
const volume=document.getElementById("volume");



const songs=[
"music.mp3",
"music2.mp3",
"music3.mp3"
];


let songIndex=0;
let musicOn=false;



music.src=songs[songIndex];

music.volume=volume.value;



volume.oninput=()=>{

music.volume=volume.value;

};





/* AUDIO ANALYSER */


const audioCtx =
new (window.AudioContext||window.webkitAudioContext)();


const source =
audioCtx.createMediaElementSource(music);


const analyser =
audioCtx.createAnalyser();


analyser.fftSize=256;


source.connect(analyser);

analyser.connect(audioCtx.destination);



const data=
new Uint8Array(analyser.frequencyBinCount);





musicBtn.onclick=async()=>{


await audioCtx.resume();


if(!musicOn){


music.play();

musicOn=true;

musicBtn.innerHTML="⏸ pause music";


}else{


music.pause();

musicOn=false;

musicBtn.innerHTML="🎵 music";


}


};





/* AUTO SONG CHANGE */


music.onended=()=>{


songIndex++;


if(songIndex>=songs.length){

songIndex=0;

}


music.src=songs[songIndex];


if(musicOn){

music.play();

}


};





/* ==========================
   VISUALIZER
========================== */


const bars=document.querySelectorAll(".bar");


let musicPower=0;



function musicUpdate(){


if(musicOn){


analyser.getByteFrequencyData(data);


let total=0;


for(let i=0;i<data.length;i++){

total+=data[i];

}


musicPower=
total/data.length;



bars.forEach((bar,i)=>{


let height=
10+
(data[i]*0.25);


bar.style.height=
height+"px";


});


}



requestAnimationFrame(musicUpdate);


}


musicUpdate();





/* ==========================
   BEAT EFFECTS
========================== */


function beatEffects(){


if(musicOn && musicPower>80){


document.body.style.filter=
"brightness(1.25)";


}else{


document.body.style.filter=
"brightness(1)";


}


requestAnimationFrame(beatEffects);


}


beatEffects();





/* ==========================
   STAR BOOST CONNECTION
========================== */


let musicBoost=0;


setInterval(()=>{


if(musicOn){


musicBoost=
musicPower/80;


}else{


musicBoost=0;


}


},100);



</script>

</script>

</body>
</html>
