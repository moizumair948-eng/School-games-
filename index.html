<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌌 Olive Class Gaming Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* 🌌 GALAXY BACKGROUND */
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;

    background: linear-gradient(-45deg, #0b001a, #1a0033, #000010, #12002b);
    background-size: 400% 400%;
    animation: bgMove 15s ease infinite;
}

@keyframes bgMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ⭐ STARS */
#stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -5;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite;
}

@keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.4); }
}

/* 🌠 SHOOTING STAR */
.shooting {
    position: fixed;
    width: 180px;
    height: 2px;
    background: linear-gradient(to right, white, transparent);
    transform: rotate(35deg);
    animation: shoot 7s linear infinite;
    z-index: -4;
}

@keyframes shoot {
    0% { transform: translate(-300px,-200px) rotate(35deg); }
    100% { transform: translate(1400px,700px) rotate(35deg); }
}

/* 🪐 PLANETS */
.planet {
    position: fixed;
    border-radius: 50%;
    z-index: -6;
}

.planet.one {
    width: 90px;
    height: 90px;
    top: 80px;
    left: 40px;
    background: radial-gradient(circle, #ff7bff, #4b0082);
}

.planet.two {
    width: 120px;
    height: 120px;
    bottom: 80px;
    right: 60px;
    background: radial-gradient(circle, #7bffea, #003b4b);
}

/* 🪐 SATURN */
.saturn {
    position: fixed;
    width: 120px;
    height: 120px;
    left: 50%;
    top: 20%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ffd6a5, #ff9f1c, #7a3e00);
    box-shadow: 0 0 40px rgba(255, 160, 60, 0.6);
    animation: saturnFloat 6s ease-in-out infinite;
    z-index: -3;
}

@keyframes saturnFloat {
    0% { transform: translate(-50%, -50%) rotate(0deg); }
    50% { transform: translate(-50%, -60%) rotate(180deg); }
    100% { transform: translate(-50%, -50%) rotate(360deg); }
}

.saturn::before {
    content: "";
    position: absolute;
    width: 180px;
    height: 40px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) rotate(25deg);
    border-radius: 50%;
    border: 4px solid rgba(255, 220, 150, 0.6);
}

/* HEADER */
header {
    text-align: center;
    padding: 25px;
}

header h1 {
    font-size: 42px;
    text-shadow: 0 0 20px #8a2be2;
}

header p {
    font-size: 14px;
    opacity: 0.7;
}

/* SEARCH */
input {
    width: 80%;
    max-width: 500px;
    padding: 12px;
    border-radius: 20px;
    border: none;
    display: block;
    margin: 10px auto;
    outline: none;
}

/* BUTTONS */
button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #8a2be2;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #c000ff;
}

/* GAMES */
.games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.game {
    background: rgba(255,255,255,0.05);
    border: 1px solid #8a2be2;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div id="stars"></div>
<div class="shooting"></div>
<div class="planet one"></div>
<div class="planet two"></div>

<!-- SATURN -->
<div class="saturn"></div>

<header>
<h1>🌌 OLIVE CLASS GAMING HUB</h1>
<p>created by moiz</p>
</header>

<!-- 🎵 MUSIC -->
<button id="musicBtn">🎵 Play Galaxy Music</button>

<audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3" type="audio/mpeg">
</audio>

<!-- SEARCH -->
<input type="text" id="search" placeholder="🔍 Search games...">

<!-- GAMES -->
<div class="games">

<div class="game"><h3>Roblox</h3><button onclick="window.open('https://www.roblox.com/')">Play</button></div>
<div class="game"><h3>Coolmath Games</h3><button onclick="window.open('https://www.coolmathgames.com/')">Play</button></div>
<div class="game"><h3>Krunker</h3><button onclick="window.open('https://krunker.io/')">Play</button></div>
<div class="game"><h3>Venge.io</h3><button onclick="window.open('https://venge.io/')">Play</button></div>
<div class="game"><h3>Shell Shockers</h3><button onclick="window.open('https://shellshock.io/')">Play</button></div>

<div class="game"><h3>Ev.io</h3><button onclick="window.open('https://ev.io/')">Play</button></div>
<div class="game"><h3>Dino Game</h3><button onclick="window.open('https://chromedino.com/')">Play</button></div>
<div class="game"><h3>Snake</h3><button onclick="window.open('https://playsnake.org/')">Play</button></div>
<div class="game"><h3>Tic Tac Toe</h3><button onclick="window.open('https://playtictactoe.org/')">Play</button></div>

<div class="game"><h3>Memory Game</h3><button onclick="alert('Coming soon')">Play</button></div>
<div class="game"><h3>Block Puzzle</h3><button onclick="alert('Coming soon')">Play</button></div>
<div class="game"><h3>Space Shooter</h3><button onclick="alert('Coming soon')">Play</button></div>
<div class="game"><h3>Brick Breaker</h3><button onclick="alert('Coming soon')">Play</button></div>
<div class="game"><h3>Clicker Game</h3><button onclick="alert('Coming soon')">Play</button></div>

<div class="game"><h3>Basketball</h3><button onclick="alert('Coming soon')">Play</button></div>
<div class="game"><h3>Racing Game</h3><button onclick="alert('Coming soon')">Play</button></div>
<div class="game"><h3>Platformer</h3><button onclick="alert('Coming soon')">Play</button></div>
<div class="game"><h3>Puzzle Game</h3><button onclick="alert('Coming soon')">Play</button></div>
<div class="game"><h3>Extra Game</h3><button onclick="alert('Coming soon')">Play</button></div>

</div>

<script>

// ⭐ STARS
const stars = document.getElementById("stars");

for (let i = 0; i < 100; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";
    star.style.animationDuration = (Math.random() * 3 + 2) + "s";
    stars.appendChild(star);
}

// 🔍 SEARCH
const search = document.getElementById("search");
const games = document.querySelectorAll(".game");

search.addEventListener("input", () => {
    const value = search.value.toLowerCase();
    games.forEach(game => {
        game.style.display = game.innerText.toLowerCase().includes(value) ? "" : "none";
    });
});

// 🎵 MUSIC TOGGLE
const music = document.getElementById("music");
const btn = document.getElementById("musicBtn");

btn.addEventListener("click", () => {
    if (music.paused) {
        music.play();
        btn.innerText = "⏸ Pause Galaxy Music";
    } else {
        music.pause();
        btn.innerText = "🎵 Play Galaxy Music";
    }
});

</script>

</body>
    </html>
