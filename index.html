<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌌 MOIZ GAMES - Galaxy Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{

background:
radial-gradient(circle at top,#26104d,#090014,#000);

overflow-x:hidden;
color:white;

}

/* Animated Stars */

#stars{
position:fixed;
width:100%;
height:100%;
left:0;
top:0;
overflow:hidden;
z-index:-5;
}

.star{

position:absolute;
background:white;
border-radius:50%;
animation:twinkle linear infinite;

}

@keyframes twinkle{

0%{
opacity:.2;
transform:scale(.5);
}

50%{
opacity:1;
transform:scale(1.3);
}

100%{
opacity:.2;
transform:scale(.5);
}

}

/* Shooting Star */

.shooting{

position:absolute;

width:220px;
height:2px;

background:linear-gradient(to right,white,transparent);

animation:shoot 7s linear infinite;

opacity:.8;

}

@keyframes shoot{

0%{

transform:
translate(-300px,-200px)
rotate(35deg);

}

100%{

transform:
translate(1800px,900px)
rotate(35deg);

}

}

/* Floating Planet */

.planet{

position:fixed;

right:40px;
top:80px;

width:120px;
height:120px;

border-radius:50%;

background:
radial-gradient(circle at 30% 30%,
#ff9df8,
#8d3bff,
#2b005e);

box-shadow:
0 0 60px #8a2be2;

animation:
floatPlanet 6s ease-in-out infinite;

z-index:-2;

}

@keyframes floatPlanet{

0%{transform:translateY(0px);}
50%{transform:translateY(20px);}
100%{transform:translateY(0px);}

}

/* Header */

header{

text-align:center;

padding:40px;

}

header h1{

font-size:60px;

color:#d88cff;

text-shadow:

0 0 20px #c700ff,
0 0 50px #8a2be2;

}

header p{

margin-top:10px;

color:#d8c8ff;

}

/* Search */

.searchBox{

display:flex;

justify-content:center;

margin:25px;

}

.searchBox input{

width:80%;
max-width:600px;

padding:15px;

border:none;

outline:none;

border-radius:30px;

font-size:18px;

background:#170027;

color:white;

box-shadow:
0 0 20px #8a2be2;

}

/* Top Controls */

.controls{

display:flex;

justify-content:center;

gap:15px;

flex-wrap:wrap;

margin-bottom:30px;

}

.controls button,
.controls select{

padding:12px 20px;

border:none;

border-radius:25px;

background:#8a2be2;

color:white;

cursor:pointer;

transition:.3s;

box-shadow:
0 0 15px #8a2be2;

}

.controls button:hover,
.controls select:hover{

transform:scale(1.08);

box-shadow:
0 0 35px #d100ff;

}

/* Games Grid */

.games{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:20px;

padding:30px;

}

.game{

background:rgba(255,255,255,.05);

border:1px solid #8a2be2;

border-radius:20px;

padding:20px;

text-align:center;

transition:.35s;

backdrop-filter:blur(8px);

}

.game:hover{

transform:
translateY(-8px)
scale(1.03);

box-shadow:
0 0 30px #b400ff;

}

.game h2{

margin-bottom:12px;

}

.playBtn{

margin-top:15px;

padding:12px 20px;

background:#8a2be2;

border:none;

border-radius:30px;

color:white;

font-size:16px;

cursor:pointer;

transition:.3s;

}

.playBtn:hover{

background:#c000ff;

box-shadow:
0 0 25px #d000ff;

}

footer{

padding:40px;

text-align:center;

color:#999;

}

/* Mobile */

@media(max-width:700px){

header h1{

font-size:38px;

}

}

</style>

</head>

<body>

<div id="stars"></div>

<div class="shooting"></div>

<div class="planet"></div>

<header>

<h1>🌌 MOIZ GAMES</h1>

<p>The Ultimate Galaxy Arcade</p>

</header>

<div class="searchBox">

<input
type="text"
id="search"
placeholder="🔍 Search Games...">

</div>

<div class="controls">

<button id="musicButton">
🎵 Music OFF
</button>

<select id="playlist">

<option>Choose Music</option>
<option>Yara Yara Phonk</option>
<option>Tiki Tiki Phonk</option>
<option>Gaming Theme</option>

</select>

<button id="favButton">
⭐ Favourites
</button>

</div>

<div class="games">
