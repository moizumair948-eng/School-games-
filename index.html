<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Olive Gaming Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;
    background: radial-gradient(circle at top, #12002b, #000);
}

/* HEADER */
header {
    text-align: center;
    padding: 25px 10px;
}

header h1 {
    font-size: 32px;
    margin: 0;
    text-shadow: 0 0 20px #8a2be2;
}

header p {
    margin: 5px 0 0;
    opacity: 0.7;
    font-size: 14px;
}

/* SATURN */
.saturn {
    position: fixed;
    top: 10%;
    right: -120px;
    width: 320px;
    height: 320px;
    animation: float 6s ease-in-out infinite;
    z-index: 0;
}

.saturn::before {
    content: "";
    position: absolute;
    width: 180px;
    height: 180px;
    top: 70px;
    left: 70px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ffd9a0, #ff9a3c, #6b2d00);
}

.saturn::after {
    content: "";
    position: absolute;
    width: 320px;
    height: 120px;
    top: 100px;
    left: 0;
    border-radius: 50%;
    border: 4px solid rgba(255,220,160,0.6);
    transform: rotate(25deg);
    animation: ringSpin 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(20px); }
    100% { transform: translateY(0px); }
}

@keyframes ringSpin {
    from { transform: rotate(25deg) rotateZ(0deg); }
    to { transform: rotate(25deg) rotateZ(360deg); }
}

/* MENU */
.menu {
    display: flex;
    overflow-x: auto;
    gap: 20px;
    padding: 30px;
    scroll-snap-type: x mandatory;
    margin-top: 70px;
}

.menu::-webkit-scrollbar {
    display: none;
}

.game {
    min-width: 180px;
    background: rgba(255,255,255,0.05);
    border: 1px solid #8a2be2;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    scroll-snap-align: center;
    transition: 0.3s;
    user-select: none;
}

.game.selected {
    transform: scale(1.35);
    box-shadow: 0 0 50px #b400ff;
    border: 2px solid white;
}

button {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    background: #8a2be2;
    color: white;
    cursor: pointer;
}

/* WARP */
#warp {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(120,0,255,0.6), transparent);
    transform: translate(-50%, -50%);
    z-index: 9999;
    pointer-events: none;
    opacity: 0;
}

#warp.active {
    animation: warp 0.6s ease-out;
}

@keyframes warp {
    0% { width: 0; height: 0; opacity: 1; }
    50% { width: 600px; height: 600px; opacity: 0.9; }
    100% { width: 1400px; height: 1400px; opacity: 0; }
}

/* PARTICLES */
.particle {
    position: fixed;
    width: 5px;
    height: 5px;
    background: white;
    border-radius: 50%;
    pointer-events: none;
    z-index: 999;
    box-shadow: 0 0 10px white;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(0) translate(var(--x), var(--y)); opacity: 0; }
}

</style>
</head>

<body>

<div class="saturn"></div>
<div id="warp"></div>

<header>
<h1>OLIVE CLASS GAMING HUB</h1>
<p>made by moiz</p>
</header>

<div class="menu">

<div class="game"><h3>Roblox</h3><button>Play</button></div>
<div class="game"><h3>Minecraft</h3><button>Play</button></div>
<div class="game"><h3>Fortnite</h3><button>Play</button></div>
<div class="game"><h3>Valorant</h3><button>Play</button></div>
<div class="game"><h3>CS2</h3><button>Play</button></div>

<div class="game"><h3>Rocket League</h3><button>Play</button></div>
<div class="game"><h3>GTA V</h3><button>Play</button></div>
<div class="game"><h3>COD</h3><button>Play</button></div>
<div class="game"><h3>FIFA</h3><button>Play</button></div>
<div class="game"><h3>Among Us</h3><button>Play</button></div>

<div class="game"><h3>Fall Guys</h3><button>Play</button></div>
<div class="game"><h3>Subway Surfers</h3><button>Play</button></div>
<div class="game"><h3>Temple Run</h3><button>Play</button></div>
<div class="game"><h3>Geometry Dash</h3><button>Play</button></div>
<div class="game"><h3>Clash Royale</h3><button>Play</button></div>

<div class="game"><h3>Brawl Stars</h3><button>Play</button></div>
<div class="game"><h3>Stumble Guys</h3><button>Play</button></div>
<div class="game"><h3>Shell Shockers</h3><button>Play</button></div>
<div class="game"><h3>Krunker</h3><button>Play</button></div>
<div class="game"><h3>Venge.io</h3><button>Play</button></div>

<div class="game"><h3>Extra</h3><button>Play</button></div>

</div>

<script>

const games = document.querySelectorAll(".game");
let index = 0;
const warp = document.getElementById("warp");

function triggerWarp(){
    warp.classList.remove("active");
    void warp.offsetWidth;
    warp.classList.add("active");
}

function update(){
    triggerWarp();

    setTimeout(()=>{
        games.forEach(g=>g.classList.remove("selected"));
        games[index].classList.add("selected");
        games[index].scrollIntoView({behavior:"smooth",inline:"center"});
    },180);
}

update();

/* KEYBOARD */
document.addEventListener("keydown",(e)=>{

    if(e.key==="ArrowRight" || e.key==="d" || e.key==="D"){
        index=(index+1)%games.length;
        update();
    }

    if(e.key==="ArrowLeft" || e.key==="a" || e.key==="A"){
        index=(index-1+games.length)%games.length;
        update();
    }

    if(e.key==="Enter"){
        triggerWarp();
        setTimeout(()=>games[index].querySelector("button").click(),250);
    }
});

/* SWIPE */
let startX=0;

document.addEventListener("touchstart",(e)=>{
startX=e.touches[0].clientX;
});

document.addEventListener("touchend",(e)=>{
let endX=e.changedTouches[0].clientX;

if(Math.abs(startX-endX)>50){
if(startX>endX) index=(index+1)%games.length;
else index=(index-1+games.length)%games.length;
update();
}
});

/* CLICK PARTICLES */
document.addEventListener("click",(e)=>{
for(let i=0;i<20;i++){
const p=document.createElement("div");
p.className="particle";

const angle=Math.random()*Math.PI*2;
const dist=Math.random()*120;

p.style.left=e.clientX+"px";
p.style.top=e.clientY+"px";

p.style.setProperty("--x",Math.cos(angle)*dist+"px");
p.style.setProperty("--y",Math.sin(angle)*dist+"px");

document.body.appendChild(p);
setTimeout(()=>p.remove(),900);
}
});

</script>

</body>
                                              </html>
