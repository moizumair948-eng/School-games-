<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🌌 Olive Class Gaming Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* 🌌 MOVING GALAXY BACKGROUND */
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;

    background: linear-gradient(-45deg, #0b001a, #1a0033, #000010, #12002b);
    background-size: 400% 400%;
    animation: galaxyMove 15s ease infinite;
}

@keyframes galaxyMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ⭐ STAR LAYER */
#stars {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -3;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 3s infinite;
}

@keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.4); }
}

/* 🌠 SHOOTING STAR */
.shooting {
    position: fixed;
    width: 180px;
    height: 2px;
    background: linear-gradient(to right, white, transparent);
    transform: rotate(35deg);
    animation: shoot 7s linear infinite;
    z-index: -2;
}

@keyframes shoot {
    0% { transform: translate(-300px,-200px) rotate(35deg); }
    100% { transform: translate(1400px,700px) rotate(35deg); }
}

/* 🪐 FLOATING PLANETS */
.planet {
    position: fixed;
    border-radius: 50%;
    z-index: -4;
    opacity: 0.7;
    animation: float 8s ease-in-out infinite;
}

.planet.one {
    width: 80px;
    height: 80px;
    top: 80px;
    left: 40px;
    background: radial-gradient(circle, #ff7bff, #4b0082);
}

.planet.two {
    width: 120px;
    height: 120px;
    bottom: 100px;
    right: 60px;
    background: radial-gradient(circle, #7bffea, #003b4b);
    animation-duration: 10s;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(20px); }
    100% { transform: translateY(0px); }
}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
}

header h1 {
    font-size: 45px;
    text-shadow: 0 0 25px #8a2be2;
}

header p {
    font-size: 14px;
    opacity: 0.7;
}

/* SEARCH */
input {
    width: 80%;
    max-width: 500px;
    padding: 12px;
    border-radius: 20px;
    border: none;
    margin: 10px auto;
    display: block;
    outline: none;
}

/* BUTTONS */
button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: #8a2be2;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #c000ff;
}

/* GAME GRID */
.games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.game {
    background: rgba(255,255,255,0.05);
    border: 1px solid #8a2be2;
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
}

.game:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #b400ff;
}

</style>
</head>

<body>

<!-- STARS -->
<div id="stars"></div>

<!-- SHOOTING STAR -->
<div class="shooting"></div>

<!-- PLANETS -->
<div class="planet one"></div>
<div class="planet two"></div>

<header>
<h1>🌌 OLIVE CLASS GAMING HUB</h1>
<p>created by moiz</p>
</header>

<!-- MUSIC (OPTIONAL BUTTON) -->
<button onclick="playMusic()">🎵 Chill Music</button>

<audio id="music">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<input type="text" id="search" placeholder="🔍 Search games...">

<div class="games">

<div class="game"><h3>Roblox</h3><button onclick="window.open('https://www.roblox.com/')">Play</button></div>
<div class="game"><h3>Coolmath</h3><button onclick="window.open('https://www.coolmathgames.com/')">Play</button></div>
<div class="game"><h3>Krunker</h3><button onclick="window.open('https://krunker.io/')">Play</button></div>
<div class="game"><h3>Venge</h3><button onclick="window.open('https://venge.io/')">Play</button></div>
<div class="game"><h3>Shell Shockers</h3><button onclick="window.open('https://shellshock.io/')">Play</button></div>

</div>

<script>

// SEARCH
const search = document.getElementById("search");
const games = document.querySelectorAll(".game");

search.addEventListener("input", () => {
    const value = search.value.toLowerCase();
    games.forEach(g => {
        g.style.display = g.innerText.toLowerCase().includes(value) ? "block" : "none";
    });
});

// STARS GENERATION
const stars = document.getElementById("stars");

for (let i = 0; i < 100; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";
    star.style.animationDuration = (Math.random() * 3 + 2) + "s";
    stars.appendChild(star);
}

// MUSIC
function playMusic() {
    document.getElementById("music").play();
}

</script>

</body>
</html>
